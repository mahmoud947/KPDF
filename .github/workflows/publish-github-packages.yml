name: Publish GitHub Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-github-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish KMP artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show publish context
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Actor: $GITHUB_ACTOR"
          echo "Ref: $GITHUB_REF"
          echo "Tag: ${GITHUB_REF_NAME}"
          ./gradlew --version

      - name: Verify tag matches VERSION_NAME
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION="$(grep '^VERSION_NAME=' gradle.properties | cut -d'=' -f2)"
          echo "Tag version: ${TAG_VERSION}"
          echo "Gradle VERSION_NAME: ${GRADLE_VERSION}"
          if [[ "${TAG_VERSION}" != "${GRADLE_VERSION}" ]]; then
            echo "Tag version does not match VERSION_NAME in gradle.properties" >&2
            exit 1
          fi

      - name: List publish tasks
        run: ./gradlew tasks --group publishing --stacktrace

      - name: Publish to GitHub Packages
        run: ./gradlew publishAllPublicationsToGithubPackagesRepository --stacktrace --info
