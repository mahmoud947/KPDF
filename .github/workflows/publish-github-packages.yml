name: Publish GitHub Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-github-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish KMP artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show publish context
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Actor: $GITHUB_ACTOR"
          echo "Ref: $GITHUB_REF"
          echo "Tag: ${GITHUB_REF_NAME}"
          ./gradlew --version

      - name: Derive version from tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: ${TAG_VERSION}"
          echo "VERSION_NAME=${TAG_VERSION}" >> "$GITHUB_ENV"

      - name: List publish tasks
        run: ./gradlew tasks --group publishing --stacktrace
        env:
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ env.VERSION_NAME }}

      - name: Publish to GitHub Packages
        run: ./gradlew publishAllPublicationsToGithubPackagesRepository --stacktrace --info
        env:
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ env.VERSION_NAME }}
